# Adapted for WSL.
# Deviation from upstream: git_branch + git_status are ENABLED so the
# current branch shows beside the repo name (per request). Language/version
# detectors stay disabled to keep his minimal aesthetic.

add_newline = false

format = """
$directory\
$git_branch\
$git_status\
$character"""

[character]
format = "$symbol "
success_symbol = "[λ](bold green)"   # success
error_symbol   = "[λ](bold red)"     # last command failed
vicmd_symbol   = "[λ](bold yellow)"  # vim normal mode

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true              # inside a repo, path starts at the repo name
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"

# Keep language/version detectors off (upstream minimal style)
[c]
disabled = true
[nodejs]
disabled = true
[python]
disabled = true
[rust]
disabled = true
[golang]
disabled = true
[java]
disabled = true
[package]
disabled = true
